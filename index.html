<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#5C3880">
  <title>Conta Comigo Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
  <style>
    /* ════════════════════════════════
       TOKENS
    ════════════════════════════════ */
    :root {
      --primary:     #9B72B0;
      --primary-lt:  #C4A8D8;
      --primary-dk:  #6248A0;
      --primary-xdk: #3A1F60;
      --green:       #3DAF8A;
      --green-dk:    #2A8A6C;
      --green-bg:    #EDFAF5;
      --red:         #E05C72;
      --red-dk:      #B83050;
      --red-bg:      #FFF0F3;
      --amber:       #F0A830;
      --amber-dk:    #A86C10;
      --amber-bg:    #FFFBEE;
      --bg:          #F7F0FB;
      --white:       #FFFFFF;
      --text-dk:     #261840;
      --text-md:     #5A4870;
      --text-lt:     #9086A8;
      --border:      #E2D8EF;
      --sh:          0 2px 16px rgba(62,31,96,.10);
      --sh-md:       0 6px 28px rgba(62,31,96,.16);
      --sh-sm:       0 1px 6px  rgba(62,31,96,.07);
      --r:           20px;
      --r-sm:        14px;
      --nav-h:       70px;
      --sb-w:        252px;
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-dk);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100%;
    }

    /* ════════════════════════════════
       SIDEBAR (desktop only — hidden mobile)
    ════════════════════════════════ */
    .sidebar { display: none; }

    /* ════════════════════════════════
       DESKTOP TOPBAR (hidden mobile)
    ════════════════════════════════ */
    .desk-topbar { display: none; }

    /* ════════════════════════════════
       MOBILE HEADER
    ════════════════════════════════ */
    .app-header {
      background: linear-gradient(148deg, #6248A0 0%, #3A1F60 55%, #2A1048 100%);
      color: #fff;
      padding: 22px 22px 18px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 6px 32px rgba(42,16,72,.52);
      overflow: hidden;
    }
    .app-header::before {
      content:''; position:absolute; top:-60px; right:-50px;
      width:190px; height:190px; border-radius:50%;
      background:rgba(255,255,255,.06); pointer-events:none;
    }
    .app-header::after {
      content:''; position:absolute; bottom:-60px; right:80px;
      width:120px; height:120px; border-radius:50%;
      background:rgba(255,255,255,.04); pointer-events:none;
    }
    .app-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px; font-weight: 700;
      letter-spacing: .1px; line-height: 1.15; margin-bottom: 3px;
    }
    .greeting { font-size: 14px; font-weight: 500; opacity: .68; }
    .screen-title-h {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700;
    }
    .month-nav {
      display: flex; align-items: center; gap: 8px;
      margin-top: 16px;
      background: rgba(255,255,255,.12); border-radius: 30px; padding: 4px;
    }
    .month-btn {
      background: rgba(255,255,255,.16); border: none; color: #fff;
      width: 34px; height: 34px; border-radius: 50%;
      cursor: pointer; font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; flex-shrink: 0;
    }
    .month-btn:active { background: rgba(255,255,255,.32); }
    .month-label { font-size: 14px; font-weight: 600; text-align: center; flex: 1; opacity: .90; }

    /* ════════════════════════════════
       SCREENS
    ════════════════════════════════ */
    .screen { display: none; padding: 16px 15px calc(var(--nav-h) + 96px); }
    .screen.active { display: block; }

    /* ════════════════════════════════
       ALERT BANNER
    ════════════════════════════════ */
    .alert-banner {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-dk) 100%);
      border-radius: var(--r-sm); padding: 12px 14px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
      color: #fff; box-shadow: 0 4px 14px rgba(46,144,112,.35); cursor: pointer;
    }
    .ab-icon { font-size: 22px; flex-shrink: 0; }
    .ab-text { flex: 1; min-width: 0; }
    .ab-title { font-size: 13px; font-weight: 700; }
    .ab-sub   { font-size: 11px; opacity: .82; margin-top: 1px; }
    .ab-arrow { font-size: 14px; opacity: .8; flex-shrink: 0; }

    /* ════════════════════════════════
       DASH TOP (hero + mini cards)
    ════════════════════════════════ */
    .dash-top { margin-bottom: 18px; }

    /* Hero */
    .card-hero {
      background: linear-gradient(148deg, #6248A0 0%, #3A1F60 55%, #2A1048 100%);
      border-radius: var(--r); padding: 13px 20px 10px;
      margin-bottom: 10px; color: #fff;
      position: relative; overflow: hidden;
      box-shadow: 0 10px 36px rgba(42,16,72,.48);
    }
    .card-hero::before {
      content:''; position:absolute; top:-40px; right:-40px;
      width:150px; height:150px; border-radius:50%;
      background:rgba(255,255,255,.07); pointer-events:none;
    }
    .card-hero::after {
      content:''; position:absolute; bottom:-30px; left:10px;
      width:110px; height:110px; border-radius:50%;
      background:rgba(255,255,255,.04); pointer-events:none;
    }
    .hero-eyebrow {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .9px; opacity: .60; margin-bottom: 8px;
      display: flex; align-items: center; gap: 7px;
    }
    .hero-eyebrow span {
      display: inline-block; width: 22px; height: 1.5px;
      background: rgba(255,255,255,.45); border-radius: 2px;
    }
    .hero-value {
      font-family: 'Playfair Display', serif;
      font-size: 34px; font-weight: 700; line-height: 1;
      margin-bottom: 8px; position: relative; z-index: 1; letter-spacing: -.5px;
    }
    .hero-value.neg { color: #FFB3C8; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; position: relative; z-index: 1; }
    .hero-pill {
      background: rgba(255,255,255,.13); border-radius: 12px; padding: 10px 13px;
      border: 1px solid rgba(255,255,255,.10);
    }
    .hero-pill-lbl { font-size: 10px; opacity: .65; font-weight: 600; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
    .hero-pill-val { font-size: 15px; font-weight: 700; }

    /* Mini cards (mobile: 3-col row) */
    .cards-row {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 9px;
    }
    .card-mini {
      background: var(--white); border-radius: var(--r-sm);
      padding: 14px 10px 16px; box-shadow: var(--sh);
      position: relative; overflow: hidden;
      border-top: 3px solid transparent;
    }
    .card-mini.cm-green  { background: var(--green-bg); border-top-color: var(--green); }
    .card-mini.cm-amber  { background: var(--amber-bg); border-top-color: var(--amber); }
    .card-mini.cm-red    { background: var(--red-bg);   border-top-color: var(--red); }
    .cm-icon  { font-size: 20px; margin-bottom: 8px; }
    .cm-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
    .cm-value { font-size: 13px; font-weight: 700; line-height: 1.15; }
    .card-mini.cm-green  .cm-label, .card-mini.cm-green  .cm-value { color: var(--green-dk); }
    .card-mini.cm-amber  .cm-label, .card-mini.cm-amber  .cm-value { color: var(--amber-dk); }
    .card-mini.cm-red    .cm-label, .card-mini.cm-red    .cm-value { color: var(--red-dk); }

    /* Hero stats row */
    .hero-stats-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .hero-stat { flex: 1; }
    .hero-stat-lbl { font-size: 10px; opacity: .58; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }
    .hero-stat-val { font-size: 15px; font-weight: 700; }
    .hero-stat-val.grn { color: #8EEEC4; }
    .hero-stat-val.red { color: #FFB3C8; }
    .hero-stat-div { width: 1px; height: 30px; background: rgba(255,255,255,.18); flex-shrink: 0; }
    .hero-saldo-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; opacity: .50; margin-bottom: 2px; }
    .hero-tax { font-size: 11px; opacity: .55; margin-top: 4px; display: flex; align-items: center; gap: 5px; }
    .hero-tax strong { opacity: .85; font-size: 12px; }

    /* Mini KPIs */
    .mini-kpis {
      display: flex; background: var(--white); border-radius: var(--r-sm);
      padding: 12px 6px; margin-bottom: 10px;
      box-shadow: var(--sh-sm); border: 1px solid rgba(226,216,239,.4);
    }
    .mkpi { flex: 1; text-align: center; }
    .mkpi-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--text-lt); margin-bottom: 4px; }
    .mkpi-val { font-size: 13px; font-weight: 700; }
    .mkpi-val.grn { color: var(--green-dk); }
    .mkpi-val.amb { color: var(--amber-dk); }
    .mkpi-val.red { color: var(--red-dk); }
    .mkpi-sep { width: 1px; background: var(--border); margin: 0 4px; align-self: stretch; }

    /* Quick Actions */
    .quick-actions { display: flex; gap: 8px; margin-bottom: 18px; }
    .qa-btn {
      flex: 1; padding: 11px 6px; border: none; border-radius: var(--r-sm);
      font-size: 12px; font-weight: 700; font-family: 'DM Sans', inherit;
      cursor: pointer; transition: all .18s; line-height: 1.2; letter-spacing: .05px;
    }
    .qa-primary {
      flex: 1.5;
      background: linear-gradient(135deg, var(--primary), var(--primary-dk));
      color: #fff; box-shadow: 0 4px 14px rgba(98,72,160,.35);
    }
    .qa-secondary {
      background: var(--white); color: var(--primary-dk);
      border: 1.5px solid var(--border); box-shadow: var(--sh-sm);
    }
    .qa-btn:active { transform: scale(.96); opacity: .86; }

    /* New Lancamento modal */
    .nlm-overlay {
      position: fixed; inset: 0; background: rgba(38,24,64,.45);
      backdrop-filter: blur(4px); z-index: 500;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .nlm-modal {
      background: var(--white); border-radius: 24px 24px 0 0;
      padding: 20px 20px 36px; width: 100%; max-width: 480px;
      animation: slideUpNlm .26s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes slideUpNlm {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .nlm-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 18px; }
    .nlm-title {
      font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700;
      color: var(--primary-dk); text-align: center; margin-bottom: 18px;
    }
    .nlm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .nlm-btn {
      padding: 20px 12px; border: none; border-radius: var(--r-sm);
      font-size: 15px; font-weight: 700; font-family: 'DM Sans', inherit;
      cursor: pointer; text-align: center; line-height: 1.5; transition: opacity .15s;
    }
    .nlm-btn:active { opacity: .80; }
    .nlm-rev { background: var(--green-bg); color: var(--green-dk); border: 1.5px solid rgba(61,175,138,.3); }
    .nlm-exp { background: var(--red-bg);   color: var(--red-dk);   border: 1.5px solid rgba(224,92,114,.3); }
    .nlm-close {
      width: 100%; padding: 12px; border: 1.5px solid var(--border);
      border-radius: var(--r-sm); background: none; font-size: 14px; font-weight: 600;
      color: var(--text-lt); cursor: pointer; font-family: 'DM Sans', inherit;
    }

    /* ════════════════════════════════
       DASH TWO COLUMNS (mobile: stacked)
    ════════════════════════════════ */
    .dash-col + .dash-col { margin-top: 20px; }

    /* ════════════════════════════════
       SECTION TITLE
    ════════════════════════════════ */
    .sec-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-lt);
      margin-bottom: 10px; margin-top: 2px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sec-link {
      font-size: 11px; font-weight: 600; color: var(--primary);
      background: none; border: none; cursor: pointer; font-family: inherit;
    }
    .sec-link:active { opacity: .7; }

    /* ════════════════════════════════
       HISTORY ITEMS
    ════════════════════════════════ */
    .history-item {
      background: var(--white); border-radius: var(--r-sm);
      padding: 13px 15px; margin-bottom: 9px;
      box-shadow: var(--sh); display: flex; align-items: center; gap: 13px;
      border: 1px solid rgba(226,216,239,.35);
    }
    .h-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; flex-shrink: 0; letter-spacing: -.3px;
    }
    .h-info { flex: 1; min-width: 0; }
    .h-name { font-size: 14px; font-weight: 600; color: var(--text-dk); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .h-sub  { font-size: 11px; color: var(--text-lt); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badges { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
    .badge  { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; display: inline-block; letter-spacing: .15px; }
    .b-pago  { background: #D6F5EA; color: #1E7A52; }
    .b-pend  { background: #FFF3CC; color: #966010; }
    .b-canc  { background: #FFE0E5; color: #B03040; }
    .b-fixed { background: #EDE4F5; color: var(--primary-dk); }
    .h-right { text-align: right; flex-shrink: 0; }
    .h-val   { font-size: 14px; font-weight: 700; }
    .h-val.rev { color: var(--green-dk); }
    .h-val.exp { color: var(--red-dk); }
    .btn-act {
      display: block; border: none; background: none;
      font-family: 'DM Sans', inherit; font-weight: 600; cursor: pointer;
      padding: 3px 7px; border-radius: 6px; margin-top: 4px; font-size: 11px; line-height: 1;
    }
    .btn-pay { color: var(--green-dk); background: var(--green-bg); padding: 4px 9px; }
    .btn-del { color: #C0B0D0; transition: color .15s; }
    .btn-del:active { color: var(--red); }

    /* ════════════════════════════════
       EMPTY STATE
    ════════════════════════════════ */
    .empty { text-align: center; padding: 46px 20px; color: var(--text-lt); }
    .empty-ico { font-size: 52px; display: block; margin-bottom: 12px; }
    .empty-txt { font-size: 15px; font-weight: 600; }
    .empty-sub { font-size: 13px; margin-top: 4px; opacity: .8; }

    /* ════════════════════════════════
       FORM CARD
    ════════════════════════════════ */
    .form-card {
      background: var(--white); border-radius: var(--r);
      padding: 22px 20px; box-shadow: var(--sh); margin-bottom: 14px;
      border: 1px solid rgba(226,216,239,.4);
    }
    .fc-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 700; color: var(--primary-dk); margin-bottom: 22px;
    }
    .fg { margin-bottom: 16px; }
    .fg:last-child { margin-bottom: 0; }
    .flabel {
      display: block; font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .45px; color: var(--text-lt); margin-bottom: 7px;
    }
    .finput, .fselect {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid var(--border); border-radius: var(--r-sm);
      font-size: 15px; font-family: 'DM Sans', inherit;
      color: var(--text-dk); background: #FDFBFF;
      transition: border-color .2s, box-shadow .2s;
      outline: none; -webkit-appearance: none; appearance: none;
    }
    .finput:focus, .fselect:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(155,114,176,.14); background: #fff;
    }
    .finput::placeholder { color: var(--text-lt); }
    .sel-wrap { position: relative; }
    .sel-wrap::after {
      content: '▾'; position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); color: var(--primary); font-size: 13px; pointer-events: none;
    }
    .sel-wrap .fselect { padding-right: 36px; cursor: pointer; }
    .status-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .sts-btn {
      padding: 12px; border: 2px solid var(--border); border-radius: var(--r-sm);
      font-size: 13px; font-weight: 700; font-family: 'DM Sans', inherit;
      cursor: pointer; background: var(--white); color: var(--text-lt);
      transition: all .18s; text-align: center;
    }
    .sts-pago { border-color: var(--green); background: var(--green-bg); color: var(--green-dk); }
    .sts-pend { border-color: var(--amber); background: var(--amber-bg); color: var(--amber-dk); }
    .btn-primary {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #7A52A8, #4A2D80);
      color: #fff; border: none; border-radius: var(--r-sm);
      font-size: 16px; font-weight: 700; font-family: 'DM Sans', inherit;
      cursor: pointer; letter-spacing: .3px;
      box-shadow: 0 8px 24px rgba(74,45,128,.40);
      transition: opacity .2s, transform .1s;
    }
    .btn-primary:active { opacity: .88; transform: scale(.99); }

    /* ════════════════════════════════
       FIXED EXPENSES
    ════════════════════════════════ */
    .fix-header {
      font-family: 'Playfair Display', serif;
      font-size: 17px; font-weight: 700; color: var(--primary-dk); margin-bottom: 14px;
    }
    .fix-item {
      display: flex; align-items: center;
      padding: 10px 0; border-bottom: 1px solid rgba(226,216,239,.55); gap: 11px;
    }
    .fix-item:last-of-type { border-bottom: none; }
    .fix-ico {
      width: 36px; height: 36px; border-radius: 10px;
      background: #EDE4F5; display: flex; align-items: center;
      justify-content: center; font-size: 17px; flex-shrink: 0;
    }
    .fix-label { flex: 1; font-size: 13px; color: var(--text-md); font-weight: 500; }
    .fix-val   { font-size: 13px; font-weight: 700; color: var(--primary-dk); }
    .fix-total {
      display: flex; justify-content: space-between; align-items: center;
      padding: 13px 16px; margin-top: 10px;
      background: linear-gradient(135deg, var(--primary-dk), var(--primary-xdk));
      border-radius: var(--r-sm); color: #fff;
    }
    .fix-total-lbl { font-size: 11px; font-weight: 700; opacity: .75; text-transform: uppercase; letter-spacing: .4px; }
    .fix-total-val { font-size: 19px; font-weight: 700; }

    /* ════════════════════════════════
       COMING SOON CARDS
    ════════════════════════════════ */
    .soon-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px;
    }
    .soon-card {
      background: var(--white); border-radius: var(--r-sm);
      padding: 16px 14px; box-shadow: var(--sh);
      border: 1px solid rgba(226,216,239,.35);
      cursor: pointer; transition: opacity .15s;
      display: flex; flex-direction: column; gap: 4px;
      position: relative; overflow: hidden;
    }
    .soon-card:active { opacity: .72; }
    .soon-card::after {
      content: '🔒'; position: absolute; top: 10px; right: 12px;
      font-size: 12px; opacity: .30;
    }
    .soon-icon  { font-size: 26px; margin-bottom: 4px; }
    .soon-name  { font-size: 13px; font-weight: 700; color: var(--text-dk); }
    .soon-desc  { font-size: 11px; color: var(--text-lt); line-height: 1.3; }
    .soon-badge {
      display: inline-block; margin-top: 6px; font-size: 9px; font-weight: 700;
      letter-spacing: .4px; text-transform: uppercase; padding: 3px 8px;
      border-radius: 20px; background: #EDE4F5; color: var(--primary-dk); width: fit-content;
    }

    /* ════════════════════════════════
       PRÓXIMOS COMPROMISSOS
    ════════════════════════════════ */
    .comp-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: var(--white);
      border-radius: var(--r-sm); margin-bottom: 7px;
      box-shadow: var(--sh-sm); border: 1px solid rgba(226,216,239,.35);
    }
    .comp-time { font-size: 12px; font-weight: 700; color: var(--primary-dk); min-width: 38px; flex-shrink: 0; }
    .comp-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--text-dk); }
    .comp-status { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
    .cs-confirmado { background: #D6F5EA; color: #1E7A52; }
    .cs-aguardando { background: #FFF3CC; color: #966010; }
    .cs-pendente   { background: #FFE0E5; color: #B03040; }

<script>
'use strict';

/* ── CONSTANTS ── */
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const FIXED = [
  { desc:'Aluguel',     cat:'Moradia',    val:1200 },
  { desc:'Secretária',  cat:'Pessoal',    val:800  },
  { desc:'Combustível', cat:'Transporte', val:300  },
  { desc:'Materiais',   cat:'Materiais',  val:250  },
  { desc:'Internet',    cat:'Comunicação',val:150  },
  { desc:'Contador',    cat:'Serviços',   val:200  },
  { desc:'Tecnologia',  cat:'Tecnologia', val:100  },
];

const REV_TYPES  = ['Avaliação','Retorno','Domiciliar','Amamentação','Disfagia'];
const PAY_MODES  = ['Pix','Dinheiro','Cartão Débito','Cartão Crédito','Plano de Saúde'];
const EXP_CATS   = ['Moradia','Pessoal','Transporte','Materiais','Comunicação',
                     'Serviços','Tecnologia','Marketing','Saúde','Outros'];
const TAX        = 0.06;
const FIXED_TOTAL= FIXED.reduce((s,e) => s + e.val, 0);

const COMING_SOON = [
  { icon:'📲', name:'WhatsApp',        desc:'Mensagens automáticas'        },
  { icon:'🧠', name:'Segundo Cérebro', desc:'Notas e protocolos'           },
  { icon:'📋', name:'Rel. Contador',   desc:'Exportar para contabilidade'  },
];

const COMPROMISSOS_HOJE = [
  { time: '09:00', name: 'Maria Silva',   status: 'Confirmado' },
  { time: '10:30', name: 'João Pereira',  status: 'Aguardando' },
  { time: '14:00', name: 'Ana Lima',      status: 'Confirmado' },
  { time: '15:30', name: 'Carlos Mendes', status: 'Pendente'   },
];

const DOCK_ITEMS = [
  {
    icon: '📲', label: 'WhatsApp',
    name: 'WhatsApp Business',
    tagline: 'Mantenha seus pacientes sempre informados',
    benefits: ['Confirmações automáticas de consulta', 'Lembretes personalizados por paciente', 'Comunicação profissional e ágil'],
  },
  {
    icon: '🧾', label: 'Emissão NF',
    name: 'Emissão de Nota Fiscal',
    tagline: 'Automatize sua NF com um clique',
    benefits: ['Emissão automática após atendimento', 'Integração com sistemas fiscais', 'Histórico organizado por competência'],
  },
  {
    icon: '📊', label: 'Rel. Contador',
    name: 'Relatório Contador',
    tagline: 'Seu contador sempre atualizado',
    benefits: ['Relatórios mensais prontos para envio', 'Exportação em PDF e Excel', 'Classificação por categoria fiscal'],
  },
  {
    icon: '🧠', label: '2° Cérebro',
    name: 'Segundo Cérebro',
    tagline: 'Seu conhecimento clínico organizado',
    benefits: ['Protocolos e anotações por paciente', 'Base de conhecimento pesquisável', 'Sincronização entre dispositivos'],
  },
];

/* ── STATE ── */
let vMonth  = new Date().getMonth();
let vYear   = new Date().getFullYear();
let curScr  = 'dashboard';
let hFilter = 'all';
let rStatus = 'Pago';

/* ── DB ── */
const DB = {
  revs : () => JSON.parse(localStorage.getItem('cc_rev')  || '[]'),
  exps : () => JSON.parse(localStorage.getItem('cc_exp')  || '[]'),
  inits: () => JSON.parse(localStorage.getItem('cc_init') || '[]'),
  saveR: d  => localStorage.setItem('cc_rev',  JSON.stringify(d)),
  saveE: d  => localStorage.setItem('cc_exp',  JSON.stringify(d)),
  saveI: d  => localStorage.setItem('cc_init', JSON.stringify(d)),
};

/* ── UTILS ── */
function uid()   { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmt(v)  { return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v); }
function fDate(s){ if(!s) return ''; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }
function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function byMonth(items) {
  return items.filter(i => {
    const d = new Date(i.date + 'T00:00:00');
    return d.getFullYear() === vYear && d.getMonth() === vMonth;
  });
}

/* ── INIT MONTH (auto-load fixed expenses) ── */
function maybeInit() {
  const now = new Date();
  const key = `${now.getFullYear()}-${now.getMonth()}`;
  const list = DB.inits();
  if (list.includes(key)) return;
  const exps = DB.exps();
  const date = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  FIXED.forEach(f => exps.push({
    id:uid(), date, description:f.desc, category:f.cat,
    value:f.val, isFixed:true, createdAt:new Date().toISOString()
  }));
  DB.saveE(exps);
  list.push(key);
  DB.saveI(list);
}

/* ── COMING SOON ── */
function showSoon(name) { toast(`🔜 ${name} — em breve!`); }

/* ── TOAST ── */
function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = Object.assign(document.createElement('div'), {className:'toast', textContent:msg});
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

/* ── ICONS ── */
const TYPE_ICON = {Avaliação:'📋',Retorno:'🔄',Domiciliar:'🏠',Amamentação:'🤱',Disfagia:'🫀'};
const CAT_ICON  = {Moradia:'🏠',Pessoal:'👤',Transporte:'🚗',Materiais:'📦',
                   Comunicação:'📡',Serviços:'🔧',Tecnologia:'💻',Marketing:'📢',Saúde:'💊',Outros:'📌'};

/* ── AVATAR ── */
const AV_PAL = [
  ['#EDE4F5','#6248A0'], ['#DFFAF3','#2A8A6C'],
  ['#FFE8EC','#B83050'], ['#FFF3CC','#966010'],
  ['#E4EEF8','#3A6EA0'], ['#F5E4F8','#7840A0'],
  ['#FDE8F0','#A03060'], ['#E4F5EC','#2A7850'],
];
function avatarRev(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0x7fffffff;
  const [bg, fg] = AV_PAL[h % AV_PAL.length];
  const ini = name.trim().split(/\s+/).slice(0,2).map(w => w[0]||'').join('').toUpperCase() || '?';
  return `<div class="h-avatar" style="background:${bg};color:${fg};">${ini}</div>`;
}
function avatarExp(cat) {
  const ico = CAT_ICON[cat] || '💸';
  return `<div class="h-avatar" style="background:#EDE4F5;font-size:20px;">${ico}</div>`;
}

/* ── NAVIGATION ── */
function setMonthLabel(lbl) {
  document.getElementById('month-lbl').textContent = lbl;
  document.getElementById('desk-month-lbl').textContent = lbl;
}

function go(screen) {
  curScr = screen;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');

  /* mobile bottom nav */
  document.querySelectorAll('.nav-btn[data-nav]').forEach(b =>
    b.classList.toggle('active', b.dataset.nav === screen));

  /* sidebar nav */
  document.querySelectorAll('.sn-btn[data-nav]').forEach(b =>
    b.classList.toggle('active', b.dataset.nav === screen));

  const screenTitles = {
    dashboard: 'Painel', revenue: 'Lançar Receita',
    expense: 'Lançar Despesa', history: 'Histórico'
  };

  /* mobile header */
  const appname  = document.getElementById('hd-appname');
  const greeting = document.getElementById('hd-greeting');
  const title    = document.getElementById('hd-title');
  const mnav     = document.getElementById('month-nav');
  if (screen === 'dashboard') {
    appname.style.display = 'block'; greeting.style.display = 'block';
    title.style.display = 'none'; mnav.style.display = 'flex';
  } else {
    appname.style.display = 'none'; greeting.style.display = 'none';
    title.textContent = screenTitles[screen]; title.style.display = 'block';
    mnav.style.display = screen === 'history' ? 'flex' : 'none';
  }

  /* desktop topbar */
  document.getElementById('desk-title').textContent = screenTitles[screen] || '';
  document.getElementById('desk-greeting').style.display = screen === 'dashboard' ? 'block' : 'none';
  document.getElementById('desk-month-nav').style.display =
    (screen === 'dashboard' || screen === 'history') ? 'flex' : 'none';

  setMonthLabel(`${MONTHS[vMonth]} ${vYear}`);
  render(screen);
}

function navMonth(dir) {
  vMonth += dir;
  if (vMonth > 11) { vMonth = 0; vYear++; }
  if (vMonth < 0)  { vMonth = 11; vYear--; }
  setMonthLabel(`${MONTHS[vMonth]} ${vYear}`);
  render(curScr);
}

function render(s) {
  if (s === 'dashboard') renderDash();
  else if (s === 'history') renderHistory();
  else if (s === 'revenue') renderRevForm();
  else if (s === 'expense') renderExpForm();
}

/* ── HISTORY ITEM HTML ── */
function itemHtml(e, actions) {
  if (e._t === 'rev') {
    const pend = e.status === 'Pendente';
    return `
      <div class="history-item">
        ${avatarRev(e.patient)}
        <div class="h-info">
          <div class="h-name">${esc(e.patient)}</div>
          <div class="h-sub">${esc(e.type)} · ${esc(e.payment)} · ${fDate(e.date)}</div>
          <div class="badges"><span class="badge ${pend?'b-pend':'b-pago'}">${e.status}</span></div>
        </div>
        <div class="h-right">
          <div class="h-val rev">${fmt(e.value)}</div>
          ${actions && pend ? `<button class="btn-act btn-pay" onclick="markPaid('${e.id}')">✓ Pagar</button>` : ''}
          ${actions ? `<button class="btn-act btn-del" onclick="delEntry('rev','${e.id}')">✕ excluir</button>` : ''}
        </div>
      </div>`;
  } else {
    return `
      <div class="history-item">
        ${avatarExp(e.category)}
        <div class="h-info">
          <div class="h-name">${esc(e.description)}</div>
          <div class="h-sub">${esc(e.category)} · ${fDate(e.date)}</div>
          ${e.isFixed ? '<div class="badges"><span class="badge b-fixed">Fixo</span></div>' : ''}
        </div>
        <div class="h-right">
          <div class="h-val exp">−${fmt(e.value)}</div>
          ${actions ? `<button class="btn-act btn-del" onclick="delEntry('exp','${e.id}')">✕ excluir</button>` : ''}
        </div>
      </div>`;
  }
}

/* ── DASHBOARD ── */
function renderDash() {
  const revs = byMonth(DB.revs());
  const exps = byMonth(DB.exps());

  const paid      = revs.filter(r => r.status === 'Pago').reduce((s,r) => s + r.value, 0);
  const pending   = revs.filter(r => r.status === 'Pendente').reduce((s,r) => s + r.value, 0);
  const totalRev  = paid + pending;
  const expTot    = exps.reduce((s,e) => s + e.value, 0);
  const tax       = paid * TAX;
  const result    = paid - expTot - tax;
  const pendCount = revs.filter(r => r.status === 'Pendente').length;

  const recent = [
    ...revs.map(r => ({...r, _t:'rev'})),
    ...exps.map(e => ({...e, _t:'exp'})),
  ].sort((a,b) => b.date.localeCompare(a.date) || b.createdAt.localeCompare(a.createdAt)).slice(0,6);

  const alertHtml = pendCount > 0 ? `
    <div class="alert-banner" onclick="go('history')">
      <span class="ab-icon">🔔</span>
      <div class="ab-text">
        <div class="ab-title">${pendCount} consulta${pendCount>1?'s':''} aguardando pagamento</div>
        <div class="ab-sub">Toque para ver e marcar como pago</div>
      </div>
      <span class="ab-arrow">›</span>
    </div>` : '';

  const recentHtml = recent.length === 0
    ? `<div class="empty">
         <span class="empty-ico">🌸</span>
         <div class="empty-txt">Nenhum lançamento ainda</div>
         <div class="empty-sub">Use os botões abaixo para começar!</div>
       </div>`
    : recent.map(e => itemHtml(e, false)).join('');

  const compromissosHtml = COMPROMISSOS_HOJE.length === 0
    ? `<div class="comp-empty"><span class="comp-empty-ico">📅</span>Nenhum compromisso hoje</div>`
    : COMPROMISSOS_HOJE.map(c => `
      <div class="comp-item">
        <span class="comp-time">${c.time}</span>
        <span class="comp-name">${esc(c.name)}</span>
        <span class="comp-status cs-${c.status.toLowerCase()}">${c.status}</span>
      </div>`).join('');

  document.getElementById('screen-dashboard').innerHTML = `
    ${alertHtml}

    <div class="dash-top">
      <div class="card-hero">
        <div class="hero-stats-row">
          <div class="hero-stat">
            <div class="hero-stat-lbl">Receita do mês</div>
            <div class="hero-stat-val grn">${fmt(totalRev)}</div>
          </div>
          <div class="hero-stat-div"></div>
          <div class="hero-stat">
            <div class="hero-stat-lbl">Despesas</div>
            <div class="hero-stat-val red">${fmt(expTot)}</div>
          </div>
        </div>
        <div class="hero-saldo-lbl">Saldo</div>
        <div class="hero-value${result < 0 ? ' neg' : ''}">${fmt(result)}</div>
        <div class="hero-tax">💡 Imposto est. 6% · <strong>${fmt(tax)}</strong></div>
      </div>

      <div class="mini-kpis">
        <div class="mkpi">
          <div class="mkpi-lbl">Receita recebida</div>
          <div class="mkpi-val grn">${fmt(paid)}</div>
        </div>
        <div class="mkpi-sep"></div>
        <div class="mkpi">
          <div class="mkpi-lbl">A receber</div>
          <div class="mkpi-val amb">${fmt(pending)}</div>
        </div>
        <div class="mkpi-sep"></div>
        <div class="mkpi">
          <div class="mkpi-lbl">Total despesas</div>
          <div class="mkpi-val red">${fmt(expTot)}</div>
        </div>
      </div>

      <div class="quick-actions">
        <button class="qa-btn qa-primary" onclick="openNewLancamento()">+ Novo Lançamento</button>
        <button class="qa-btn qa-secondary" onclick="go('revenue')">+ Receita</button>
        <button class="qa-btn qa-secondary" onclick="go('expense')">+ Despesa</button>
      </div>
    </div>

    <div class="dash-two-col">
      <div class="dash-col">
        <div class="sec-title">
          <span>Lançamentos Recentes</span>
          ${recent.length > 0 ? `<button class="sec-link" onclick="go('history')">Ver todos →</button>` : ''}
        </div>
        ${recentHtml}
      </div>

      <div class="dash-col">
        <div class="sec-title"><span>Compromissos de Hoje 📅</span></div>
        ${compromissosHtml}
      </div>
    </div>
  `;
}

/* ── REVENUE FORM ── */
function renderRevForm() {
  rStatus = 'Pago';
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('screen-revenue').innerHTML = `
    <div class="form-card">
      <div class="fc-title">Nova Receita 💰</div>
      <div class="fg">
        <label class="flabel">Data</label>
        <input type="date" class="finput" id="rv-date" value="${today}">
      </div>
      <div class="fg">
        <label class="flabel">Paciente</label>
        <input type="text" class="finput" id="rv-patient" placeholder="Nome do paciente" autocomplete="off">
      </div>
      <div class="fg">
        <label class="flabel">Tipo de Atendimento</label>
        <div class="sel-wrap">
          <select class="fselect" id="rv-type">
            ${REV_TYPES.map(t => `<option>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="flabel">Valor (R$)</label>
        <input type="number" class="finput" id="rv-val" placeholder="0,00" min="0.01" step="0.01">
      </div>
      <div class="fg">
        <label class="flabel">Forma de Pagamento</label>
        <div class="sel-wrap">
          <select class="fselect" id="rv-pay">
            ${PAY_MODES.map(m => `<option>${m}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="flabel">Status do Pagamento</label>
        <div class="status-row">
          <button class="sts-btn sts-pago" id="sBtn-pago"    onclick="setRStatus('Pago')">✓ Pago</button>
          <button class="sts-btn"          id="sBtn-pendente" onclick="setRStatus('Pendente')">⏳ Pendente</button>
        </div>
      </div>
      <button class="btn-primary" onclick="saveRev()" style="margin-top:8px;">Salvar Receita</button>
    </div>`;
}

function setRStatus(s) {
  rStatus = s;
  document.getElementById('sBtn-pago').className    = 'sts-btn' + (s === 'Pago'     ? ' sts-pago' : '');
  document.getElementById('sBtn-pendente').className = 'sts-btn' + (s === 'Pendente' ? ' sts-pend' : '');
}

function saveRev() {
  const date    = document.getElementById('rv-date').value;
  const patient = document.getElementById('rv-patient').value.trim();
  const type    = document.getElementById('rv-type').value;
  const value   = parseFloat(document.getElementById('rv-val').value);
  const payment = document.getElementById('rv-pay').value;
  if (!date || !patient || !value || value <= 0) { toast('⚠️ Preencha todos os campos!'); return; }
  const revs = DB.revs();
  revs.push({ id:uid(), date, patient, type, value, payment, status:rStatus, createdAt:new Date().toISOString() });
  DB.saveR(revs);
  toast('✅ Receita lançada com sucesso!');
  go('dashboard');
}

        <input type="date" class="finput" id="ex-date" value="${today}">

      <div class="fg">
        <label class="flabel">Descrição</label>
        <input type="text" class="finput" id="ex-desc" placeholder="Ex: Material de escritório" autocomplete="off">
      </div>
      <div class="fg">
        <label class="flabel">Categoria</label>
        <div class="sel-wrap">

      </div>
    </div>`;

function saveExp() {
  const date  = document.getElementById('ex-date').value;
  const desc  = document.getElementById('ex-desc').value.trim();
  const cat   = document.getElementById('ex-cat').value;
  const value = parseFloat(document.getElementById('ex-val').value);
  if (!date || !desc || !value || value <= 0) { toast('⚠️ Preencha todos os campos!'); return; }
  const exps = DB.exps();
  exps.push({ id:uid(), date, description:desc, category:cat, value, isFixed:false, createdAt:new Date().toISOString() });
  DB.saveE(exps);
  toast('✅ Despesa lançada com sucesso!');
  go('dashboard');
}

/* ── HISTORY ── */
function renderHistory() {
  const revs = byMonth(DB.revs());
  const exps = byMonth(DB.exps());
  let entries = [];
  if (hFilter !== 'expense') entries.push(...revs.map(r => ({...r, _t:'rev'})));
  if (hFilter !== 'revenue') entries.push(...exps.map(e => ({...e, _t:'exp'})));
  entries.sort((a,b) => b.date.localeCompare(a.date) || b.createdAt.localeCompare(a.createdAt));

  document.getElementById('screen-history').innerHTML = `
    <div class="filter-tabs">
      <button class="f-tab ${hFilter==='all'?'active':''}"     onclick="setFilter('all')">Todos</button>
      <button class="f-tab ${hFilter==='revenue'?'active':''}" onclick="setFilter('revenue')">Receitas</button>
      <button class="f-tab ${hFilter==='expense'?'active':''}" onclick="setFilter('expense')">Despesas</button>
    </div>
    ${entries.length === 0
      ? `<div class="empty">
           <span class="empty-ico">🌸</span>
           <div class="empty-txt">Nenhum lançamento neste mês</div>
         </div>`
      : entries.map(e => itemHtml(e, true)).join('')}`;
}

function setFilter(f) { hFilter = f; renderHistory(); }

/* ── ACTIONS ── */
function delEntry(type, id) {
  if (!confirm('Excluir este lançamento?')) return;
  if (type === 'rev') DB.saveR(DB.revs().filter(r => r.id !== id));
  else                DB.saveE(DB.exps().filter(e => e.id !== id));
  toast('🗑️ Lançamento excluído');
  render(curScr);
}

function markPaid(id) {
  const revs = DB.revs();
  const r = revs.find(r => r.id === id);
  if (r) { r.status = 'Pago'; DB.saveR(revs); toast('✅ Marcado como pago!'); render(curScr); }
}

/* ── NEW LANCAMENTO MODAL ── */
function openNewLancamento() {
  const el = document.createElement('div');
  el.className = 'nlm-overlay';
  el.onclick = e => { if (e.target === el) el.remove(); };
  el.innerHTML = `
    <div class="nlm-modal">
      <div class="nlm-handle"></div>
      <div class="nlm-title">Novo Lançamento</div>
      <div class="nlm-grid">
        <button class="nlm-btn nlm-rev" onclick="this.closest('.nlm-overlay').remove();go('revenue')">
          💰<br>Receita
        </button>
        <button class="nlm-btn nlm-exp" onclick="this.closest('.nlm-overlay').remove();go('expense')">
          💸<br>Despesa
        </button>
      </div>
      <button class="nlm-close" onclick="this.closest('.nlm-overlay').remove()">Cancelar</button>
    </div>`;
  document.body.appendChild(el);
}

/* ── DOCK ── */
let activeDockIdx = null;

function initDock() {
  const dock = document.createElement('div');
  dock.className = 'macos-dock';
  dock.innerHTML = DOCK_ITEMS.map((it, i) => `
    <div class="dock-item" id="dock-item-${i}" onclick="toggleDockPreview(${i})">
      <div class="dock-icon">${it.icon}</div>
      <div class="dock-label">${it.label}</div>
    </div>`).join('');
  document.body.appendChild(dock);

  document.addEventListener('click', e => {
    if (!e.target.closest('.macos-dock') && !e.target.closest('.dock-preview')) {
      closeDockPreview();
    }
  });
}

function toggleDockPreview(i) {
  if (activeDockIdx === i) { closeDockPreview(); return; }
  activeDockIdx = i;
  document.querySelectorAll('.dock-item').forEach((el, idx) =>
    el.classList.toggle('dock-item-active', idx === i));

  const prev = document.querySelector('.dock-preview');
  if (prev) prev.remove();

  const it = DOCK_ITEMS[i];
  const panel = document.createElement('div');
  panel.className = 'dock-preview';
  panel.innerHTML = `
    <div class="dp-close" onclick="closeDockPreview()">×</div>
    <div class="dp-icon">${it.icon}</div>
    <div class="dp-name">${it.name}</div>
    <div class="dp-tagline">${it.tagline}</div>
    <ul class="dp-benefits">
      ${it.benefits.map(b => `<li>${b}</li>`).join('')}
    </ul>
    <div class="dp-soon">🔜 Em breve no Conta Comigo Pro</div>`;
  document.body.appendChild(panel);
}

function closeDockPreview() {
  const p = document.querySelector('.dock-preview');
  if (p) p.remove();
  document.querySelectorAll('.dock-item').forEach(el => el.classList.remove('dock-item-active'));
  activeDockIdx = null;
}

/* ── START ── */
maybeInit();
initDock();
go('dashboard');
</script>
